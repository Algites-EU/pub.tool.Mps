name: App automation documentation site

on:
  workflow_dispatch:
    inputs:
      publication-kind:
        description: "Documentation publication kind."
        required: true
        type: string
      publication-id:
        description: "Documentation publication id."
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-pages-automation-${{ github.ref }}-${{ inputs['publication-kind'] }}-${{ inputs['publication-id'] }}
  cancel-in-progress: true

jobs:
  verify-automation-actor:
    name: Verify automation actor
    runs-on: ubuntu-latest
    steps:
      - name: Verify GitHub App actor
        shell: bash
        run: |
          set -euo pipefail

          locActor="${GITHUB_ACTOR}"
          locActorLower="${locActor,,}"

          case "${locActorLower}" in
            algites.github.*\[bot\]|algites-github-*\[bot\])
              echo "Accepted automation actor: ${locActor}"
              ;;
            *)
              echo "This workflow is intended to be triggered only by Algites GitHub App automation."
              echo "Rejected actor: ${locActor}"
              exit 1
              ;;
          esac

  publish-docs:
    needs: verify-automation-actor
    uses: Algites-EU/pub.gov.Algites/.github/workflows/algites-universal-docs-site.yml@main
    with:
      gradle-task: generateAlgitesDocsSite
      java-version: "21"
      publication-kind: ${{ inputs['publication-kind'] }}
      publication-id: ${{ inputs['publication-id'] }}
      documentation-branch: documentation
      publication-target: ""
      gradle-arguments: "--warning-mode all"
      publish-pages: true
